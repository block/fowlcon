name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  bats:
    name: Bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run all bats tests
        run: bats tests/formats/ tests/scripts/
